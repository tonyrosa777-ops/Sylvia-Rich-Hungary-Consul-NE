<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 100" fill="none">
  <!--
    St. Stephen's Crown (Holy Crown of Hungary) — Heraldic Crest v3
    hungarianconsulne.com
    Changes: dome crown (not 3-prong), red-first stripes, green right field,
    small heraldic crown at cross base, hills behind crown.
  -->
  <defs>
    <clipPath id="ssc-shield">
      <path d="M12,26 H68 V65 C68,83 40,97 40,97 C40,97 12,83 12,65 Z"/>
    </clipPath>
  </defs>

  <!-- ════════════ ST. STEPHEN'S CROWN — CLOSED DOME ════════════
       The Holy Crown is a domed/hemispherical closed crown, NOT a 3-pronged
       open crown. Two bands of arches cross over the dome; enamel portrait
       medallions are inset into the dome surface. The tilted cross sits at apex.
  -->

  <!-- Dome body (hemisphere, slightly wider than shield) -->
  <path d="M10,26 C10,12 25,1 40,1 C55,1 70,12 70,26 Z" fill="#D4AF37"/>

  <!-- Dome front equator arch — gives 3-D dome illusion -->
  <path d="M10,26 C22,15 30,11 40,10 C50,11 58,15 70,26"
        fill="none" stroke="#B8943A" stroke-width="1.2" opacity="0.7"/>

  <!-- Dome meridian arches (cross-section lines) -->
  <path d="M40,1 C37,5 35,14 35,26" fill="none" stroke="#B8943A" stroke-width="0.8" opacity="0.45"/>
  <path d="M40,1 C43,5 45,14 45,26" fill="none" stroke="#B8943A" stroke-width="0.8" opacity="0.45"/>

  <!-- Enamel portrait medallions on dome face
       St. Stephen's Crown has 8 Byzantine enamel panels with religious portraits.
       Shown here as colored oval panels inset into the gold dome. -->
  <!-- Center panel (blue, largest — faces viewer) -->
  <rect x="35.5" y="5.5" width="9" height="10" rx="1.5" fill="#1A3F7A" stroke="#D4AF37" stroke-width="0.5"/>
  <rect x="37"   y="7"   width="6" height="7"  rx="1"   fill="#2655A0"/>
  <!-- Left panel (red) -->
  <rect x="22" y="11" width="7.5" height="9" rx="1.5" fill="#CE2939" stroke="#D4AF37" stroke-width="0.5"/>
  <rect x="23.5" y="12.5" width="4.5" height="6" rx="1" fill="#E03C4E"/>
  <!-- Right panel (red) -->
  <rect x="50.5" y="11" width="7.5" height="9" rx="1.5" fill="#CE2939" stroke="#D4AF37" stroke-width="0.5"/>
  <rect x="52"   y="12.5" width="4.5" height="6" rx="1" fill="#E03C4E"/>
  <!-- Far-left panel (blue, partially visible) -->
  <rect x="13" y="17" width="6" height="7" rx="1.2" fill="#1A3F7A" stroke="#D4AF37" stroke-width="0.4"/>
  <!-- Far-right panel (blue, partially visible) -->
  <rect x="61" y="17" width="6" height="7" rx="1.2" fill="#1A3F7A" stroke="#D4AF37" stroke-width="0.4"/>

  <!-- Lower circlet/band -->
  <rect x="10" y="21" width="60" height="7" rx="2" fill="#C5A55A"/>
  <!-- Band enamel gems: alternating blue · red · blue · green · blue · red · blue -->
  <circle cx="14.5" cy="24.5" r="2.3" fill="#1A3F7A" stroke="#F5F0E8" stroke-width="0.3"/>
  <circle cx="22"   cy="24.5" r="2.3" fill="#CE2939" stroke="#F5F0E8" stroke-width="0.3"/>
  <circle cx="30"   cy="24.5" r="2.3" fill="#1A3F7A" stroke="#F5F0E8" stroke-width="0.3"/>
  <circle cx="40"   cy="24.5" r="2.3" fill="#1B6B30" stroke="#F5F0E8" stroke-width="0.3"/>
  <circle cx="50"   cy="24.5" r="2.3" fill="#1A3F7A" stroke="#F5F0E8" stroke-width="0.3"/>
  <circle cx="58"   cy="24.5" r="2.3" fill="#CE2939" stroke="#F5F0E8" stroke-width="0.3"/>
  <circle cx="65.5" cy="24.5" r="2.3" fill="#1A3F7A" stroke="#F5F0E8" stroke-width="0.3"/>

  <!-- TILTED CROSS at dome apex — the defining feature of St. Stephen's Crown.
       The apostolic double cross (two horizontal bars) leans ~22° clockwise;
       historically bent during transport and left as-is. -->
  <g transform="rotate(22, 40, 1)">
    <rect x="38.8" y="-7"  width="2.4" height="13"  rx="0.7" fill="#D4AF37"/>
    <rect x="35"   y="-4"  width="10"  height="2.2" rx="0.6" fill="#D4AF37"/>
    <rect x="33"   y="1.5" width="14"  height="2.2" rx="0.6" fill="#D4AF37"/>
  </g>

  <!-- Pendilia — left (hanging chain ornaments from crown sides) -->
  <line x1="10" y1="24" x2="4"  y2="35" stroke="#C5A55A" stroke-width="0.7" opacity="0.85"/>
  <circle cx="4"  cy="36"   r="2"   fill="#C5A55A" stroke="#D4AF37" stroke-width="0.4"/>
  <line x1="4"  y1="38" x2="3"  y2="46" stroke="#C5A55A" stroke-width="0.6" opacity="0.65"/>
  <circle cx="3"  cy="47.5" r="1.5" fill="#C5A55A"/>

  <!-- Pendilia — right -->
  <line x1="70" y1="24" x2="76" y2="35" stroke="#C5A55A" stroke-width="0.7" opacity="0.85"/>
  <circle cx="76" cy="36"   r="2"   fill="#C5A55A" stroke="#D4AF37" stroke-width="0.4"/>
  <line x1="76" y1="38" x2="77" y2="46" stroke="#C5A55A" stroke-width="0.6" opacity="0.65"/>
  <circle cx="77" cy="47.5" r="1.5" fill="#C5A55A"/>

  <!-- ════════════ HERALDIC SHIELD ════════════ -->

  <!-- Shield base -->
  <path d="M12,26 H68 V65 C68,83 40,97 40,97 C40,97 12,83 12,65 Z" fill="#0D1A2E"/>

  <g clip-path="url(#ssc-shield)">

    <!-- ── LEFT HALF: 8 stripes — RED FIRST from top ── -->
    <rect x="12" y="26" width="28" height="9" fill="#CE2939"/>  <!-- 1 Red   -->
    <rect x="12" y="35" width="28" height="9" fill="#E8E3D5"/>  <!-- 2 Silver-->
    <rect x="12" y="44" width="28" height="9" fill="#CE2939"/>  <!-- 3 Red   -->
    <rect x="12" y="53" width="28" height="9" fill="#E8E3D5"/>  <!-- 4 Silver-->
    <rect x="12" y="62" width="28" height="9" fill="#CE2939"/>  <!-- 5 Red   -->
    <rect x="12" y="71" width="28" height="9" fill="#E8E3D5"/>  <!-- 6 Silver-->
    <rect x="12" y="80" width="28" height="9" fill="#CE2939"/>  <!-- 7 Red   -->
    <rect x="12" y="89" width="28" height="9" fill="#E8E3D5"/>  <!-- 8 Silver-->

    <!-- ── RIGHT HALF: green field ("Vert") throughout ── -->
    <rect x="40" y="26" width="28" height="71" fill="#477050"/>

    <!-- Three green hills — drawn first (behind cross and small crown) -->
    <ellipse cx="43" cy="92" rx="8"  ry="13" fill="#3A6044"/>
    <ellipse cx="54" cy="88" rx="10" ry="14" fill="#3A6044"/>
    <ellipse cx="65" cy="92" rx="8"  ry="13" fill="#3A6044"/>

    <!-- Apostolic double cross — white, prominent in green field.
         Centered at x=54 (midpoint of right half). -->
    <!-- Vertical bar -->
    <rect x="52.5" y="36"  width="3"  height="36" rx="0.6" fill="#FFFFFF"/>
    <!-- Upper arm (shorter) -->
    <rect x="47.5" y="43"  width="11" height="2.5" rx="0.5" fill="#FFFFFF"/>
    <!-- Lower arm (longer) -->
    <rect x="45.5" y="51"  width="15" height="2.5" rx="0.5" fill="#FFFFFF"/>

    <!-- Small heraldic crown at cross base — gold, 3-pointed.
         In the official Hungarian arms this crown represents sovereign authority;
         the apostolic cross stands from its center point upward. -->
    <!-- Crown points (drawn first, covered by band) -->
    <path d="M47,77 L47,73 L50,68 L52.5,73 L54,65 L55.5,73 L58,68 L61,73 L61,77 Z"
          fill="#D4AF37"/>
    <!-- Crown base band -->
    <rect x="47" y="73" width="14" height="5" rx="0.5" fill="#C5A55A"/>
    <!-- Band gems -->
    <circle cx="50.5" cy="75.5" r="1.3" fill="#CE2939"/>
    <circle cx="54"   cy="75.5" r="1.3" fill="#1A3F7A"/>
    <circle cx="57.5" cy="75.5" r="1.3" fill="#CE2939"/>

  </g>

  <!-- Vertical center divider -->
  <line x1="40" y1="26" x2="40" y2="90" stroke="#C5A55A" stroke-width="0.8" opacity="0.9"/>

  <!-- Shield border (gold) -->
  <path d="M12,26 H68 V65 C68,83 40,97 40,97 C40,97 12,83 12,65 Z"
        fill="none" stroke="#C5A55A" stroke-width="1.5"/>
</svg>
