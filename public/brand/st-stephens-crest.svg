<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 100" fill="none">
  <!--
    St. Stephen's Crown (Holy Crown of Hungary) — Heraldic Crest
    Honorary Consulate of Hungary, New England — hungarianconsulne.com
    Revised: colored enamel gems, prominent cross, gold footing on hills
  -->
  <defs>
    <clipPath id="ssc-shield">
      <path d="M12,26 H68 V65 C68,83 40,97 40,97 C40,97 12,83 12,65 Z"/>
    </clipPath>
  </defs>

  <!-- ════════════ ST. STEPHEN'S CROWN ════════════ -->

  <!-- Crown base band -->
  <rect x="18" y="20" width="44" height="7" rx="1.5" fill="#C5A55A"/>

  <!-- Enamel circular medallions on band (blue · red · blue · red · blue) -->
  <circle cx="23"  cy="23.5" r="2.5" fill="#1A3F7A" stroke="#D4AF37" stroke-width="0.4"/>
  <circle cx="31"  cy="23.5" r="2.5" fill="#CE2939" stroke="#D4AF37" stroke-width="0.4"/>
  <circle cx="40"  cy="23.5" r="2.5" fill="#1A3F7A" stroke="#D4AF37" stroke-width="0.4"/>
  <circle cx="49"  cy="23.5" r="2.5" fill="#CE2939" stroke="#D4AF37" stroke-width="0.4"/>
  <circle cx="57"  cy="23.5" r="2.5" fill="#1A3F7A" stroke="#D4AF37" stroke-width="0.4"/>

  <!-- Left arch dome -->
  <path d="M22,20 C23,14 21,8 26,7 C31,6 30,14 30,20 Z" fill="#D4AF37"/>
  <!-- Left arch gem — blue enamel with gold ring -->
  <circle cx="26" cy="7"   r="3.2" fill="#D4AF37"/>
  <circle cx="26" cy="7"   r="2.5" fill="#1A3F7A"/>
  <circle cx="26" cy="7"   r="1"   fill="#3A68B8"/>

  <!-- Center arch dome (tallest) -->
  <path d="M32,20 C33,11 36,1 40,1 C44,1 47,11 48,20 Z" fill="#D4AF37"/>

  <!-- Right arch dome -->
  <path d="M50,20 C50,14 49,6 54,7 C59,8 57,14 58,20 Z" fill="#D4AF37"/>
  <!-- Right arch gem — blue enamel with gold ring -->
  <circle cx="54" cy="7"   r="3.2" fill="#D4AF37"/>
  <circle cx="54" cy="7"   r="2.5" fill="#1A3F7A"/>
  <circle cx="54" cy="7"   r="1"   fill="#3A68B8"/>

  <!--
    TILTED CROSS — defining feature of St. Stephen's Crown.
    The apostolic double cross leans ~22° clockwise; historically
    the cross was bent in transit and left as-is, becoming the crown's
    most recognizable characteristic.
  -->
  <g transform="rotate(22, 40, 1)">
    <rect x="38.8" y="-8"  width="2.4" height="14" rx="0.7" fill="#D4AF37"/>
    <rect x="35"   y="-5"  width="10"  height="2.2" rx="0.6" fill="#D4AF37"/>
    <rect x="33"   y="0.5" width="14"  height="2.2" rx="0.6" fill="#D4AF37"/>
  </g>

  <!-- Pendilia — left chain -->
  <line x1="18" y1="23" x2="11" y2="33" stroke="#C5A55A" stroke-width="0.7" opacity="0.85"/>
  <circle cx="11" cy="34"   r="2"   fill="#C5A55A" stroke="#D4AF37" stroke-width="0.4"/>
  <line x1="11" y1="36" x2="10" y2="43" stroke="#C5A55A" stroke-width="0.6" opacity="0.65"/>
  <circle cx="10" cy="44.5" r="1.5" fill="#C5A55A"/>

  <!-- Pendilia — right chain -->
  <line x1="62" y1="23" x2="69" y2="33" stroke="#C5A55A" stroke-width="0.7" opacity="0.85"/>
  <circle cx="69" cy="34"   r="2"   fill="#C5A55A" stroke="#D4AF37" stroke-width="0.4"/>
  <line x1="69" y1="36" x2="70" y2="43" stroke="#C5A55A" stroke-width="0.6" opacity="0.65"/>
  <circle cx="70" cy="44.5" r="1.5" fill="#C5A55A"/>

  <!-- ════════════ HERALDIC SHIELD ════════════ -->

  <!-- Shield base fill -->
  <path d="M12,26 H68 V65 C68,83 40,97 40,97 C40,97 12,83 12,65 Z" fill="#0D1A2E"/>

  <g clip-path="url(#ssc-shield)">

    <!-- LEFT HALF: 8 alternating silver / red horizontal stripes -->
    <rect x="12" y="26" width="28" height="9" fill="#E8E3D5"/>
    <rect x="12" y="35" width="28" height="9" fill="#CE2939"/>
    <rect x="12" y="44" width="28" height="9" fill="#E8E3D5"/>
    <rect x="12" y="53" width="28" height="9" fill="#CE2939"/>
    <rect x="12" y="62" width="28" height="9" fill="#E8E3D5"/>
    <rect x="12" y="71" width="28" height="9" fill="#CE2939"/>
    <rect x="12" y="80" width="28" height="9" fill="#E8E3D5"/>
    <rect x="12" y="89" width="28" height="9" fill="#CE2939"/>

    <!-- RIGHT HALF: red field -->
    <rect x="40" y="26" width="28" height="71" fill="#CE2939"/>

    <!--
      APOSTOLIC DOUBLE CROSS — white, prominent in red field.
      Cross sits high in the field; stem passes into the hills.
      Centered at x=54 (mid-point of right half).
    -->
    <!-- Vertical bar -->
    <rect x="52.5" y="44"  width="3"    height="32" rx="0.6" fill="#FFFFFF"/>
    <!-- Upper arm (shorter) -->
    <rect x="47.5" y="50.5" width="11"  height="2.5" rx="0.5" fill="#FFFFFF"/>
    <!-- Lower arm (longer) -->
    <rect x="45.5" y="58"   width="15"  height="2.5" rx="0.5" fill="#FFFFFF"/>

    <!--
      GOLD FOOTING — small gold pedestal at base of cross stem,
      sitting atop the center hill. This is the detail Sylvia noted.
    -->
    <rect x="50" y="72" width="8" height="5" rx="0.5" fill="#D4AF37"/>
    <rect x="51.5" y="69" width="5" height="4" rx="0.3" fill="#C5A55A"/>

    <!-- Three green hills -->
    <!-- Left hill -->
    <ellipse cx="43" cy="90" rx="8"  ry="13" fill="#477050"/>
    <!-- Center hill (tallest — cross stem roots here) -->
    <ellipse cx="54" cy="85" rx="10" ry="15" fill="#477050"/>
    <!-- Right hill -->
    <ellipse cx="65" cy="90" rx="8"  ry="13" fill="#477050"/>

  </g>

  <!-- Vertical center divider -->
  <line x1="40" y1="26" x2="40" y2="90" stroke="#C5A55A" stroke-width="0.8" opacity="0.9"/>

  <!-- Shield border (gold) -->
  <path d="M12,26 H68 V65 C68,83 40,97 40,97 C40,97 12,83 12,65 Z"
        fill="none" stroke="#C5A55A" stroke-width="1.5"/>
</svg>
