<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 100" fill="none">
  <!--
    St. Stephen's Crown (Holy Crown of Hungary) — Heraldic Crest
    Honorary Consulate of Hungary, New England
    hungarianconsulne.com
  -->
  <defs>
    <clipPath id="ssc-shield">
      <path d="M12,26 H68 V65 C68,83 40,97 40,97 C40,97 12,83 12,65 Z"/>
    </clipPath>
  </defs>

  <!-- ════════════ ST. STEPHEN'S CROWN ════════════ -->

  <!-- Crown base band (Byzantine gold) -->
  <rect x="18" y="20" width="44" height="7" rx="1.5" fill="#C5A55A"/>

  <!-- Enamel panels on base band -->
  <rect x="20"  y="21.5" width="6"  height="4" rx="0.5" fill="#0D1A2E" stroke="#D4AF37" stroke-width="0.3"/>
  <rect x="28"  y="21.5" width="5"  height="4" rx="0.5" fill="#CE2939" stroke="#D4AF37" stroke-width="0.3"/>
  <rect x="35"  y="21.5" width="10" height="4" rx="0.5" fill="#0D1A2E" stroke="#D4AF37" stroke-width="0.3"/>
  <rect x="47"  y="21.5" width="5"  height="4" rx="0.5" fill="#CE2939" stroke="#D4AF37" stroke-width="0.3"/>
  <rect x="54"  y="21.5" width="6"  height="4" rx="0.5" fill="#0D1A2E" stroke="#D4AF37" stroke-width="0.3"/>

  <!-- Left arch -->
  <path d="M22,20 C22,20 19,13 24,9 C29,5 33,9 31,14 C30,17 30,20 30,20 Z" fill="#C5A55A"/>
  <circle cx="24" cy="8.5" r="2.5" fill="#D4AF37"/>
  <circle cx="24" cy="8.5" r="1"   fill="#C5A55A"/>

  <!-- Center arch (tallest — bright gold) -->
  <path d="M32,20 C32,20 30,9 36,4 C38,2 42,2 44,4 C50,9 48,20 48,20 Z" fill="#D4AF37"/>
  <circle cx="40" cy="3.5" r="2.5" fill="#D4AF37" stroke="#F5F0E8" stroke-width="0.5"/>

  <!-- Right arch -->
  <path d="M50,20 C50,20 50,17 49,14 C47,9 51,5 56,9 C61,13 58,20 58,20 Z" fill="#C5A55A"/>
  <circle cx="56" cy="8.5" r="2.5" fill="#D4AF37"/>
  <circle cx="56" cy="8.5" r="1"   fill="#C5A55A"/>

  <!--
    TILTED CROSS — most distinctive feature of St. Stephen's Crown.
    The apostolic double cross (two bars) is bent ~22° clockwise.
    Historical: the cross was accidentally bent and left as-is.
  -->
  <g transform="rotate(22, 40, 3)">
    <rect x="38.8" y="-5"  width="2.4" height="13" rx="0.7" fill="#D4AF37"/>
    <rect x="35.5" y="-2.5" width="9"  height="2"  rx="0.6" fill="#D4AF37"/>
    <rect x="33.5" y="2.5"  width="13" height="2"  rx="0.6" fill="#D4AF37"/>
  </g>

  <!-- Pendilia — left (hanging chain ornaments) -->
  <line x1="18" y1="23" x2="11" y2="33" stroke="#C5A55A" stroke-width="0.7" opacity="0.85"/>
  <circle cx="11" cy="34"   r="2"   fill="#C5A55A" stroke="#D4AF37" stroke-width="0.4"/>
  <line x1="11" y1="36" x2="10" y2="43" stroke="#C5A55A" stroke-width="0.6" opacity="0.65"/>
  <circle cx="10" cy="44.5" r="1.5" fill="#C5A55A"/>

  <!-- Pendilia — right -->
  <line x1="62" y1="23" x2="69" y2="33" stroke="#C5A55A" stroke-width="0.7" opacity="0.85"/>
  <circle cx="69" cy="34"   r="2"   fill="#C5A55A" stroke="#D4AF37" stroke-width="0.4"/>
  <line x1="69" y1="36" x2="70" y2="43" stroke="#C5A55A" stroke-width="0.6" opacity="0.65"/>
  <circle cx="70" cy="44.5" r="1.5" fill="#C5A55A"/>

  <!-- ════════════ HERALDIC SHIELD ════════════ -->

  <!-- Shield base fill -->
  <path d="M12,26 H68 V65 C68,83 40,97 40,97 C40,97 12,83 12,65 Z" fill="#0D1A2E"/>

  <!-- All content clipped to shield boundary -->
  <g clip-path="url(#ssc-shield)">

    <!-- LEFT HALF: 8 alternating silver / red horizontal stripes -->
    <rect x="12" y="26" width="28" height="9" fill="#E8E3D5"/>
    <rect x="12" y="35" width="28" height="9" fill="#CE2939"/>
    <rect x="12" y="44" width="28" height="9" fill="#E8E3D5"/>
    <rect x="12" y="53" width="28" height="9" fill="#CE2939"/>
    <rect x="12" y="62" width="28" height="9" fill="#E8E3D5"/>
    <rect x="12" y="71" width="28" height="9" fill="#CE2939"/>
    <rect x="12" y="80" width="28" height="9" fill="#E8E3D5"/>
    <rect x="12" y="89" width="28" height="9" fill="#CE2939"/>

    <!-- RIGHT HALF: red field -->
    <rect x="40" y="26" width="28" height="60" fill="#CE2939"/>

    <!-- Green triple hills (3 hills at bottom of right half) -->
    <ellipse cx="44" cy="85" rx="7"  ry="12" fill="#477050"/>
    <ellipse cx="54" cy="79" rx="9"  ry="15" fill="#477050"/>
    <ellipse cx="65" cy="85" rx="7"  ry="12" fill="#477050"/>

    <!-- Apostolic double cross (two horizontal bars) on center hill -->
    <rect x="53"   y="55"  width="2.2" height="23" rx="0.6" fill="#E8E3D5"/>
    <rect x="49.5" y="59"  width="9.2" height="2"  rx="0.5" fill="#E8E3D5"/>
    <rect x="48"   y="65.5" width="12.2" height="2" rx="0.5" fill="#E8E3D5"/>

  </g>

  <!-- Vertical center divider -->
  <line x1="40" y1="26" x2="40" y2="90" stroke="#C5A55A" stroke-width="0.8" opacity="0.9"/>

  <!-- Shield border (gold) -->
  <path d="M12,26 H68 V65 C68,83 40,97 40,97 C40,97 12,83 12,65 Z"
        fill="none" stroke="#C5A55A" stroke-width="1.5"/>
</svg>
