<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 100" fill="none">
  <!--
    Hungarian Coat of Arms — St. Stephen's Crown v5
    hungaryconsulne.com
    Right half: Gules (red) field — matches hero animation.
    Crown cross: tilts LEFT (−10°) — authentic Holy Crown of St. Stephen lean.
    Small heraldic crown: centered at x=54 (center of right red field), base of cross.
  -->
  <defs>
    <clipPath id="ssc-shield">
      <path d="M12,27 Q12,25 14.5,24 H65.5 Q68,25 68,27 V65 C68,83 40,97 40,97 C40,97 12,83 12,65 Z"/>
    </clipPath>
  </defs>

  <!-- ════ ST. STEPHEN'S CROWN — CLOSED DOME ════ -->

  <!-- Dome body (hemisphere) -->
  <path d="M10,26 C10,12 25,1 40,1 C55,1 70,12 70,26 Z" fill="#D4AF37"/>

  <!-- Front equator arch — 3-D dome illusion -->
  <path d="M10,26 C22,15 30,11 40,10 C50,11 58,15 70,26"
        fill="none" stroke="#B8943A" stroke-width="1.2" opacity="0.65"/>

  <!-- Meridian arch lines -->
  <path d="M40,1 C37,5 35,14 35,26" fill="none" stroke="#B8943A" stroke-width="0.7" opacity="0.4"/>
  <path d="M40,1 C43,5 45,14 45,26" fill="none" stroke="#B8943A" stroke-width="0.7" opacity="0.4"/>

  <!-- Byzantine enamel portrait panels -->
  <!-- Center panel — deep blue -->
  <rect x="35.5" y="5"    width="9"   height="11" rx="1.5" fill="#1A3A8F" stroke="#C5A55A" stroke-width="0.5"/>
  <rect x="37"   y="6.5"  width="6"   height="8"  rx="1"   fill="#2655A0"/>
  <!-- Left panel — ruby red -->
  <rect x="22"   y="10"   width="7"   height="9"  rx="1.2" fill="#9B1B30" stroke="#C5A55A" stroke-width="0.5"/>
  <rect x="23.5" y="11.5" width="4.5" height="6.5" rx="0.8" fill="#B52235"/>
  <!-- Right panel — ruby red -->
  <rect x="51"   y="10"   width="7"   height="9"  rx="1.2" fill="#9B1B30" stroke="#C5A55A" stroke-width="0.5"/>
  <rect x="52.5" y="11.5" width="4.5" height="6.5" rx="0.8" fill="#B52235"/>
  <!-- Far-left panel — blue -->
  <rect x="13"   y="17"   width="5.5" height="7"  rx="1"   fill="#1A3A8F" stroke="#C5A55A" stroke-width="0.4"/>
  <!-- Far-right panel — blue -->
  <rect x="61.5" y="17"   width="5.5" height="7"  rx="1"   fill="#1A3A8F" stroke="#C5A55A" stroke-width="0.4"/>

  <!-- Gold orb at arch crossing point -->
  <circle cx="40" cy="2" r="2" fill="#E8B84B" stroke="#D4AF37" stroke-width="0.4"/>

  <!-- Lower circlet/band -->
  <rect x="10" y="21" width="60" height="7" rx="2" fill="#E8B84B"/>
  <!-- Band gemstones — ruby · sapphire · emerald repeating -->
  <circle cx="14.5" cy="24.5" r="2.3" fill="#9B1B30" stroke="#F5F0E8" stroke-width="0.3"/>
  <circle cx="22"   cy="24.5" r="2.3" fill="#1A3A8F" stroke="#F5F0E8" stroke-width="0.3"/>
  <circle cx="29.5" cy="24.5" r="2.3" fill="#1B6B3A" stroke="#F5F0E8" stroke-width="0.3"/>
  <circle cx="40"   cy="24.5" r="2.3" fill="#9B1B30" stroke="#F5F0E8" stroke-width="0.3"/>
  <circle cx="50.5" cy="24.5" r="2.3" fill="#1A3A8F" stroke="#F5F0E8" stroke-width="0.3"/>
  <circle cx="58"   cy="24.5" r="2.3" fill="#1B6B3A" stroke="#F5F0E8" stroke-width="0.3"/>
  <circle cx="65.5" cy="24.5" r="2.3" fill="#9B1B30" stroke="#F5F0E8" stroke-width="0.3"/>

  <!-- Apostolic double cross at apex — tilts LEFT (−10°).
       The Holy Crown of St. Stephen's famously bent cross leans left.
       Plain <g> for static rotation so the transform is not overridden. -->
  <g transform="rotate(-10, 40, 2)">
    <!-- Vertical shaft -->
    <rect x="38.8" y="-7"  width="2.4" height="13"  rx="0.7" fill="#FFD700"/>
    <!-- Upper crossbar — shorter -->
    <rect x="35"   y="-4"  width="10"  height="2.2" rx="0.6" fill="#FFD700"/>
    <!-- Lower crossbar — longer -->
    <rect x="33"   y="1.5" width="14"  height="2.2" rx="0.6" fill="#FFD700"/>
  </g>

  <!-- Pendilia — left (articulated chain) -->
  <line x1="10" y1="24" x2="4"  y2="34" stroke="#9A7A30" stroke-width="0.6" opacity="0.6"/>
  <circle cx="6.4" cy="27.3" r="1.5" fill="#C5A55A" stroke="#D4AF37" stroke-width="0.3"/>
  <circle cx="4.8" cy="31.3" r="1.5" fill="#C5A55A" stroke="#D4AF37" stroke-width="0.3"/>
  <circle cx="4"   cy="35"   r="3"   fill="#C5A55A" stroke="#D4AF37" stroke-width="0.5"/>
  <circle cx="4"   cy="35"   r="1.8" fill="#1A3A8F"/>
  <line x1="4"  y1="38" x2="3"  y2="44" stroke="#9A7A30" stroke-width="0.6" opacity="0.6"/>
  <circle cx="3.6" cy="40.5" r="1.3" fill="#C5A55A" stroke="#D4AF37" stroke-width="0.3"/>
  <circle cx="3.2" cy="43"   r="1.3" fill="#C5A55A" stroke="#D4AF37" stroke-width="0.3"/>
  <circle cx="3"   cy="46"   r="2.2" fill="#C5A55A" stroke="#D4AF37" stroke-width="0.4"/>
  <circle cx="3"   cy="46"   r="1.3" fill="#9B1B30"/>

  <!-- Pendilia — right (mirror) -->
  <line x1="70" y1="24" x2="76" y2="34" stroke="#9A7A30" stroke-width="0.6" opacity="0.6"/>
  <circle cx="73.6" cy="27.3" r="1.5" fill="#C5A55A" stroke="#D4AF37" stroke-width="0.3"/>
  <circle cx="75.2" cy="31.3" r="1.5" fill="#C5A55A" stroke="#D4AF37" stroke-width="0.3"/>
  <circle cx="76"   cy="35"   r="3"   fill="#C5A55A" stroke="#D4AF37" stroke-width="0.5"/>
  <circle cx="76"   cy="35"   r="1.8" fill="#1A3A8F"/>
  <line x1="76" y1="38" x2="77" y2="44" stroke="#9A7A30" stroke-width="0.6" opacity="0.6"/>
  <circle cx="76.4" cy="40.5" r="1.3" fill="#C5A55A" stroke="#D4AF37" stroke-width="0.3"/>
  <circle cx="76.8" cy="43"   r="1.3" fill="#C5A55A" stroke="#D4AF37" stroke-width="0.3"/>
  <circle cx="77"   cy="46"   r="2.2" fill="#C5A55A" stroke="#D4AF37" stroke-width="0.4"/>
  <circle cx="77"   cy="46"   r="1.3" fill="#9B1B30"/>

  <!-- ════ HERALDIC SHIELD ════ -->

  <!-- Shield dark base -->
  <path d="M12,27 Q12,25 14.5,24 H65.5 Q68,25 68,27 V65 C68,83 40,97 40,97 C40,97 12,83 12,65 Z"
        fill="#0D1A2E"/>

  <g clip-path="url(#ssc-shield)">

    <!-- LEFT HALF: 8 alternating stripes — RED FIRST (Gules, four bars Argent) -->
    <rect x="12" y="24" width="28" height="9.1" fill="#C8102E"/>
    <rect x="12" y="33" width="28" height="9.1" fill="#FFFFFF"/>
    <rect x="12" y="42" width="28" height="9.1" fill="#C8102E"/>
    <rect x="12" y="51" width="28" height="9.1" fill="#FFFFFF"/>
    <rect x="12" y="60" width="28" height="9.1" fill="#C8102E"/>
    <rect x="12" y="69" width="28" height="9.1" fill="#FFFFFF"/>
    <rect x="12" y="78" width="28" height="9.1" fill="#C8102E"/>
    <rect x="12" y="87" width="28" height="9.1" fill="#FFFFFF"/>

    <!-- RIGHT HALF: Gules (red) field — matches hero -->
    <rect x="40" y="24" width="28" height="73" fill="#C8102E"/>

    <!-- Zöld-halom: three green hills at base of right field -->
    <ellipse cx="46" cy="92" rx="8"  ry="12" fill="#1E5024"/>
    <ellipse cx="54" cy="88" rx="10" ry="14" fill="#1E5024"/>
    <ellipse cx="62" cy="92" rx="8"  ry="12" fill="#1E5024"/>

    <!-- Apostolic double cross — white on red field, no outline needed -->
    <!-- Vertical shaft -->
    <rect x="52.5" y="36" width="3"   height="38" rx="0.6" fill="#FFFFFF"/>
    <!-- Upper arm — shorter -->
    <rect x="48"   y="43" width="11"  height="3"  rx="0.5" fill="#FFFFFF"/>
    <!-- Lower arm — longer -->
    <rect x="46"   y="51" width="15"  height="3"  rx="0.5" fill="#FFFFFF"/>

    <!-- Small heraldic crown at base of cross.
         Centered at x=54 (center of right field = (40+68)/2).
         Tips peak at y=72, just below cross shaft bottom (y=74).
         Rests on the green hills. -->
    <path d="M47,79 L47,74 L50.5,69 L54,74 L57.5,69 L61,74 L61,79 Z" fill="#D4AF37"/>
    <rect x="47" y="74.5" width="14" height="5" rx="0.8" fill="#C5A55A"/>
    <circle cx="50.5" cy="77.5" r="1.3" fill="#9B1B30"/>
    <circle cx="54"   cy="77.5" r="1.3" fill="#1A3A8F"/>
    <circle cx="57.5" cy="77.5" r="1.3" fill="#9B1B30"/>

  </g>

  <!-- Vertical center divider -->
  <line x1="40" y1="24" x2="40" y2="90" stroke="#D4AF37" stroke-width="0.8" opacity="0.9"/>

  <!-- Shield border -->
  <path d="M12,27 Q12,25 14.5,24 H65.5 Q68,25 68,27 V65 C68,83 40,97 40,97 C40,97 12,83 12,65 Z"
        fill="none" stroke="#D4AF37" stroke-width="1.5"/>
</svg>
